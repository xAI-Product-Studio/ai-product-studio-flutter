name: ai_product_studio
description: AI-powered product image & ad copy generator for e-commerce sellers.
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.4.0 <4.0.0'
  flutter: '>=3.22.0'

dependencies:
  flutter:
    sdk: flutter
  flutter_localizations:
    sdk: flutter

  flutter_bloc: ^8.1.6
  equatable: ^2.0.5
  get_it: ^8.0.2
  injectable: ^2.4.4
  go_router: ^14.2.7
  dio: ^5.6.0
  pretty_dio_logger: ^1.4.0
  flutter_secure_storage: ^9.2.2
  shared_preferences: ^2.3.2
  image_picker: ^1.1.2
  cached_network_image: ^3.4.1
  flutter_image_compress: ^2.3.0
  dartz: ^0.10.1
  gap: ^3.0.1
  shimmer: ^3.0.0
  lottie: ^3.1.2
  flutter_svg: ^2.3.0
  permission_handler: ^11.3.1
  connectivity_plus: ^6.0.5
  logger: ^2.4.0
  flutter_dotenv: ^5.2.1
  flutter_screenutil: ^5.9.3
  google_fonts: ^8.1.0
  url_launcher: ^6.3.2

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^4.0.0
  injectable_generator: ^2.6.2
  build_runner: ^2.4.12
  mocktail: ^1.0.4
  bloc_test: ^9.1.7

flutter:
  uses-material-design: true
  generate: true

  assets:
    - assets/images/
    - assets/animations/
    - assets/icons/
    - assets/logos/
    - assets/logos/platforms/
    - .env