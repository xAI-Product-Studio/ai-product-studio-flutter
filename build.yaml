targets:
  $default:
    builders:
      injectable_generator|injectable_builder:
        enabled: true
        generate_for:
          include:
            - lib/**
          exclude:
            - lib/**/*.g.dart
            - lib/**/*.freezed.dart
            - lib/**/*.config.dart
            - test/**
      source_gen|combining_builder:
        options:
          ignore_for_file:
            - type=lint

global_options:
  source_gen|combining_builder:
    options:
      ignore_for_file:
        - type=lint