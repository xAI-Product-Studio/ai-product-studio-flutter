<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 52" width="200" height="52">
  <defs>
    <style>
      .wordmark-dark {
        font-family: -apple-system, BlinkMacSystemFont, 'Inter', 'SF Pro Display', sans-serif;
        font-size: 28px;
        font-weight: 300;
        letter-spacing: -0.8px;
        fill: white;
      }
    </style>
  </defs>

  <!-- Koyu arka plan -->
  <rect width="200" height="52" rx="0" fill="#1E1B4B"/>

  <!-- Mark: Şeffaf kare + T + mor spark -->
  <rect x="6" y="4" width="44" height="44" rx="10" fill="rgba(255,255,255,0.1)" stroke="rgba(255,255,255,0.2)" stroke-width="1"/>

  <!-- T yatay -->
  <rect x="15" y="14" width="26" height="6" rx="2" fill="white"/>
  <!-- T dikey -->
  <rect x="25" y="14" width="6" height="24" rx="2" fill="white"/>

  <!-- Spark -->
  <circle cx="42" cy="36" r="5" fill="#7C3AED"/>
  <circle cx="42" cy="36" r="2.5" fill="white"/>

  <!-- Wordmark -->
  <text x="60" y="37" class="wordmark-dark">titlora</text>
</svg>
