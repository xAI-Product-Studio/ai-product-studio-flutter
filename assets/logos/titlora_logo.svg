<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 52" width="200" height="52">
  <defs>
    <style>
      .wordmark {
        font-family: -apple-system, BlinkMacSystemFont, 'Inter', 'SF Pro Display', sans-serif;
        font-size: 28px;
        font-weight: 300;
        letter-spacing: -0.8px;
        fill: #1E1B4B;
      }
    </style>
  </defs>

  <!-- Mark: Kare + T + mor spark -->
  <rect x="0" y="4" width="44" height="44" rx="10" fill="#1E1B4B"/>

  <!-- T yatay çubuk -->
  <rect x="9" y="14" width="26" height="6" rx="2" fill="white"/>
  <!-- T dikey çubuk -->
  <rect x="19" y="14" width="6" height="24" rx="2" fill="white"/>

  <!-- Mor spark nokta — sağ alt köşe -->
  <circle cx="36" cy="36" r="5" fill="#7C3AED"/>
  <circle cx="36" cy="36" r="2.5" fill="white"/>

  <!-- Wordmark -->
  <text x="54" y="37" class="wordmark">titlora</text>
</svg>
